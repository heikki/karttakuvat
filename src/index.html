<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karttakuvat</title>
    <!-- MapLibre CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="map"></div>

    <div class="stats-panel">
      <h2>Karttakuvat</h2>
      <p id="count-label">0 photos found</p>
      <p id="date-range" style="font-size: 11px; color: #999"></p>
      <div class="filter-section">
        <label for="year-select">Year</label>
        <select id="year-select">
          <option value="all">All</option>
        </select>
        <label for="album-select">Album</label>
        <select id="album-select">
          <option value="all">All</option>
        </select>
        <label>Media</label>
        <div class="filter-buttons" id="media-buttons">
          <button class="filter-btn active" data-value="photo">Photos</button>
          <button class="filter-btn active" data-value="video">Videos</button>
        </div>
        <label>Location</label>
        <div class="filter-buttons" id="gps-buttons">
          <button class="filter-btn active" data-value="exif" style="--btn-color: #3b82f6">Exif</button>
          <button class="filter-btn active" data-value="inferred" style="--btn-color: #f59e0b">Inferred</button>
          <button class="filter-btn active" data-value="user" style="--btn-color: #22c55e">User</button>
          <button class="filter-btn active" data-value="none" style="--btn-color: #9ca3af">None</button>
        </div>
        <label>Map</label>
        <div class="map-type-buttons" id="map-type-buttons">
          <button class="map-type-btn active" data-style="opentopomap">
            Topo
          </button>
          <button class="map-type-btn" data-style="satellite">Satellite</button>
          <button class="map-type-btn" data-style="mml_maastokartta">
            Maasto
          </button>
          <button class="map-type-btn" data-style="mml_ortokuva">Orto</button>
        </div>
      </div>
      <button class="fit-view-btn" id="fit-view-btn">Fit to view</button>
      <div class="edit-section" id="edit-section" style="display: none">
        <span id="pending-count">0</span> pending edits
        <div class="edit-buttons">
          <button id="save-edits-btn">Save to Photos</button>
          <button id="discard-edits-btn" class="secondary">Discard</button>
        </div>
      </div>
    </div>

    <div class="lightbox" id="lightbox">
      <span class="close">&times;</span>
      <span class="nav prev">&#10094;</span>
      <span class="nav next">&#10095;</span>
      <div class="lightbox-image-wrap" id="lightbox-image-wrap">
        <img id="lightbox-img" src="" alt="" />
        <div class="play-overlay" id="lightbox-play"></div>
        <a
          id="lightbox-photos-link"
          class="photos-overlay-btn"
          href="#"
          target="_blank"
          tabindex="-1"
        ></a>
      </div>
      <div class="info" id="lightbox-info"></div>
    </div>

    <!-- Bundled Script -->
    <script type="module" src="./index.ts"></script>
  </body>
</html>
