<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karttakuvat</title>
    <!-- MapLibre CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="map"></div>

    <div class="stats-panel">
      <h2>All Photos</h2>
      <!-- Functions are now global window.browseAllPhotos etc. -->
      <div class="count" id="photo-count">0</div>
      <p>photos found</p>
      <p id="date-range"></p>
      <p style="margin-top: 10px; font-size: 11px; color: #999">
        Shift+drag to select area.
      </p>
      <div class="filter-section">
        <label for="year-select">Filter by year</label>
        <select id="year-select">
          <option value="all">All years</option>
        </select>
        <label for="gps-select">Location precision</label>
        <select id="gps-select">
          <option value="all">All locations</option>
          <option value="exif">Precise GPS only</option>
          <option value="inferred">Inferred only</option>
          <option value="user">User modified</option>
        </select>
        <label for="map-select">Map type</label>
        <select id="map-select">
          <option value="opentopomap">OpenTopoMap</option>
          <option value="satellite">Satellite</option>
          <option value="osm">OpenStreetMap</option>
          <option value="cyclosm">CyclOSM</option>
        </select>
      </div>
    </div>

    <div class="lightbox" id="lightbox">
      <span class="close">&times;</span>
      <span class="nav prev">&#10094;</span>
      <span class="nav next">&#10095;</span>
      <img id="lightbox-img" src="" alt="" />
      <a id="lightbox-photos-link" class="photos-link" href="#" target="_blank"
        >Open in Photos</a
      >
      <div class="info" id="lightbox-info"></div>
    </div>

    <!-- Bundled Script -->
    <script type="module" src="./index.ts"></script>
  </body>
</html>
